name: Build official signed AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: official-aab-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-official-aab:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_REPO_PATH: app/src/official/official-release.keystore
      KEYSTORE_GRADLE_PATH: app/src/official/official-release.keystore
      KEYSTORE_ALIAS: official
      KEYSTORE_PASSWORD: official123456
      KEY_PASSWORD: official123456

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure official release keystore exists
        id: ensure_keystore
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$KEYSTORE_REPO_PATH")"

          if [ -f "$KEYSTORE_REPO_PATH" ] && [ -s "$KEYSTORE_REPO_PATH" ]; then
            echo "Using existing keystore: $KEYSTORE_REPO_PATH"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_REPO_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEYSTORE_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=Official Release, OU=Mobile, O=GitHub Actions, L=San Francisco, S=CA, C=US"

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Upload official keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: official-release-keystore
          path: ${{ env.KEYSTORE_REPO_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Create pull request for generated keystore
        if: steps.ensure_keystore.outputs.created == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore: add official release keystore"
          title: "chore: add official release keystore"
          body: |
            This PR was created automatically by GitHub Actions after generating
            the official release signing keystore for AAB builds.
          branch: codex/official-release-keystore
          delete-branch: false
          add-paths: |
            ${{ env.KEYSTORE_REPO_PATH }}

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Print runner diagnostics
        run: |
          echo "CPU:"
          nproc
          echo "Memory:"
          free -h
          echo "Disk:"
          df -h
          echo "Java:"
          java -version

      - name: Build signed officialRelease AAB
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ env.KEYSTORE_GRADLE_PATH }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleOfficialRelease \
            -x lint \
            -x :app:lintOfficialRelease \
            -x :app:lintVitalOfficialRelease \
            -x :app:lintVitalAnalyzeOfficialRelease \
            -x :app:lintVitalReportOfficialRelease \
            -Pandroid.settings.executionProfile=lowMemory \
            -Dorg.gradle.jvmargs='-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC -Dfile.encoding=UTF-8' \
            -Dkotlin.daemon.jvmargs='-Xmx768m' \
            --max-workers=1 \
            --no-parallel \
            --no-daemon \
            --build-cache \
            --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: official-release-aab
          path: app/build/outputs/bundle/officialRelease/*.aab
          if-no-files-found: error
